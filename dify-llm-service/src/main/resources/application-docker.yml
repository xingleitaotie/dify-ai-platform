server:
  port: 8081

spring:
  application:
    name: dify-llm-service
  # 数据库配置（Docker 内部用服务名访问 MySQL）
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://mysql:3306/agent?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
  # 必须配置！让JdbcTemplate可用
  jdbc:
    template:
      query-timeout: 3

# 容器内微服务通信（使用服务名，不是localhost）
rag:
  service-url: http://dify-rag-service:8082
function:
  service-url: http://dify-function-service:8083

# Dify LLM 容器环境配置
dify:
  llm:
    type: ollama
    model-name: qwen2.5:3b-instruct-q4_K_M
    # base-url: http://ollama:11434    不使用本地时打开 Ollama
    base-url: http://host.docker.internal:11434
    api-key: ${LLM_API_KEY:}
    secret:
    max-tokens: 2048
    temperature: 0.7
    timeout: 60

# Feign 超时配置（解决 Read timed out）
feign:
  client:
    config:
      default:
        connectTimeout: 300000    # 5分钟
        readTimeout: 1200000      # 20分钟！足够模型推理

ribbon:
  ReadTimeout: 60000
  ConnectTimeout: 30000

eureka:
  client:
    serviceUrl:
      defaultZone: http://dify-eureka-server:8085/eureka/  # 注册到中心
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}